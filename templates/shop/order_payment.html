{% extends "shop/base.html" %}
{% load static %}

{% block title %}Оплата заказа{% endblock %}

{% block content %}
<div class="container my-5">
  <div class="card shadow p-4">
    <h2 class="mb-4 text-center">Оплата заказа №{{ order.id }}</h2>
    
    <p class="text-center mb-4">
      Сумма к оплате: <strong>{{ order.get_total_cost }} ₽</strong>
    </p>

    <form action="{% url 'shop:order_payment' order.id %}" method="post" id="payment-form">
      {% csrf_token %}
      <script
        src="https://checkout.stripe.com/checkout.js"
        class="stripe-button"
        data-key="{{ stripe_public_key }}"
        data-amount="{{ order.get_total_cost|floatformat:2|floatformat:'0'|add:'0'|floatformat:'0' }}00"
        data-name="Оплата заказа"
        data-description="Заказ №{{ order.id }}"
        data-image="https://stripe.com/img/documentation/checkout/marketplace.png"
        data-locale="auto"
        data-currency="rub">
      </script>
    </form>
  </div>
</div>
{% endblock %}
